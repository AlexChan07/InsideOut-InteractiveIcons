<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside OutInteractive Icons</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .bg-layer-default {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("Img/Background.png");
            background-size: 100% 100%; background-position: center;
            z-index: 1; transition: opacity 0.6s ease-in-out;
        }
        .bg-emotion {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; background-position: center;
            z-index: 2; opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            gap: 30px;
            z-index: 10; 
        }

        .icon-box {
            position: relative; width: 180px; height: 180px;
            cursor: pointer; transition: transform 0.3s ease;
        }
        .icon-box:hover { transform: scale(1.1); }

        .icon-box img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.3s ease; object-fit: contain;
        }
        .img-hover { opacity: 0; }
        .icon-box:hover .img-hover { opacity: 1; }
        .icon-box:hover .img-base { opacity: 0; }
    </style>
</head>
<body>

    <div class="bg-layer-default"></div>
    <div class="bg-emotion" id="bg-joy" style="background-image: url('Img/Joy_BG.png');"></div>
    <div class="bg-emotion" id="bg-sadness" style="background-image: url('Img/Sadness_BG.png');"></div>
    <div class="bg-emotion" id="bg-anger" style="background-image: url('Img/Anger_BG.png');"></div>
    <div class="bg-emotion" id="bg-disgust" style="background-image: url('Img/Disgust_BG.png');"></div>
    <div class="bg-emotion" id="bg-fear" style="background-image: url('Img/Fear_BG.png');"></div>
    <div class="bg-emotion" id="bg-anxiety" style="background-image: url('Img/Anxiety_BG.png');"></div>
    <div class="bg-emotion" id="bg-envy" style="background-image: url('Img/Envy_BG.png');"></div>
    <div class="bg-emotion" id="bg-ennui" style="background-image: url('Img/Ennui_BG.png');"></div>
    <div class="bg-emotion" id="bg-embar" style="background-image: url('Img/Embarrassment_BG.png');"></div>

    <div class="container">
        <div class="icon-box" onmouseenter="showBG('bg-joy'); playSound('audio-1')" onmouseleave="hideBG('bg-joy'); stopSound('audio-1')">
            <img src="Img/Joy_Inactive.png" class="img-base">
            <img src="Img/Joy_Active.png" class="img-hover">
            <audio id="audio-1" src="Sound/810183__mokasza__shine.mp3"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-sadness'); playSound('audio-2')" onmouseleave="hideBG('bg-sadness'); stopSound('audio-2')">
            <img src="Img/Sadness_Inactive.png" class="img-base">
            <img src="Img/Sadness_Active.png" class="img-hover">
            <audio id="audio-2" src="Sound/177156__abstudios__water-drop.mp3"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-anger'); playSound('audio-3')" onmouseleave="hideBG('bg-anger'); stopSound('audio-3')">
            <img src="Img/Anger_Inactive.png" class="img-base">
            <img src="Img/Anger_Active.png" class="img-hover">
            <audio id="audio-3" src="Sound/267887__wjl__short-fireball-woosh.flac"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-disgust'); playSound('audio-4')" onmouseleave="hideBG('bg-disgust'); stopSound('audio-4')">
            <img src="Img/Disgust_Inactive.png" class="img-base">
            <img src="Img/Disgust_Active.png" class="img-hover">
            <audio id="audio-4" src="Sound/344036__reitanna__disgust.wav"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-fear'); playSound('audio-5')" onmouseleave="hideBG('bg-fear'); stopSound('audio-5')">
            <img src="Img/Fear_Inactive.png" class="img-base">
            <img src="Img/Fear_Active.png" class="img-hover">
            <audio id="audio-5" src="Sound/136542__joelaudio__electric_zap_001.wav"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-anxiety'); playSound('audio-6')" onmouseleave="hideBG('bg-anxiety'); stopSound('audio-6')">
            <img src="Img/Anxiety_Inactive.png" class="img-base">
            <img src="Img/Anxiety_Active.png" class="img-hover">
            <audio id="audio-6" src="Sound/212972__patricklieberkind__fast-ticking.wav"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-envy'); playSound('audio-7')" onmouseleave="hideBG('bg-envy'); stopSound('audio-7')">
            <img src="Img/Envy_Inactive.png" class="img-base">
            <img src="Img/Envy_Active.png" class="img-hover">
            <audio id="audio-7" src="Sound/497702__miksmusic__crystal-glasses-ding-cheers-1.wav"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-ennui'); playSound('audio-8')" onmouseleave="hideBG('bg-ennui'); stopSound('audio-8')">
            <img src="Img/Ennui_Inactive.png" class="img-base">
            <img src="Img/Ennui_Active.png" class="img-hover">
            <audio id="audio-8" src="Sound/351160__reitanna__deep-sigh-and-exhale.wav"></audio>
        </div>

        <div class="icon-box" onmouseenter="showBG('bg-embar'); playSound('audio-9')" onmouseleave="hideBG('bg-embar'); stopSound('audio-9')">
            <img src="Img/Embarrassment_Inactive.png" class="img-base">
            <img src="Img/Embarrassment_Active.png" class="img-hover">
            <audio id="audio-9" src="Sound/505692__juicyarmstrong__boing-oing-oing-oing.mp3"></audio>
        </div>
    </div>

    <script>
        function showBG(id) {
            document.getElementById(id).style.opacity = "1";
        }

        function hideBG(id) {
            document.getElementById(id).style.opacity = "0";
        }

        function playSound(id) {
            const audio = document.getElementById(id);
            if (audio) { 
                audio.currentTime = 0; 
                audio.play().catch(e => console.log("Sound blocked by browser")); 
            }
        }

        function stopSound(id) {
            const audio = document.getElementById(id);
            if (audio) { audio.pause(); }
        }
    </script>
</body>
</html>
</html>
